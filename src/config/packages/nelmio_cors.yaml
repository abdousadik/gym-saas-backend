nelmio_cors:
    defaults:
        allow_credentials: false
        allow_origin: ["http://localhost:5173"]
        allow_headers:
            [
                "Content-Type",
                "Authorization",
                "Accept",
                "Origin",
                "X-Requested-With",
            ]
        allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
        expose_headers: ["Authorization"]
        max_age: 3600
    paths:
        "^/":
            allow_origin: ["http://localhost:5173"]
            allow_headers:
                [
                    "Content-Type",
                    "Authorization",
                    "Accept",
                    "Origin",
                    "X-Requested-With",
                ]
            allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
            max_age: 3600
