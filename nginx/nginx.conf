server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Main front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # --- Explicit dev front controller (LOCK IT DOWN) ---
    location = /app_dev.php {
        # allow only local access (Docker host may be different; adjust as needed)
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        include fastcgi_params;
        fastcgi_pass php:9000;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Optional: allow /app_dev.php/anything (Symfony routes with front controller)
    location ~ ^/app_dev\.php(/|$) {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        include fastcgi_params;
        fastcgi_pass php:9000;

        fastcgi_param SCRIPT_FILENAME $realpath_root/app_dev.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Only pass index.php to PHP-FPM
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # If you really want PATH_INFO (not required for most Symfony apps):
        # fastcgi_split_path_info ^(.+\.php)(/.*)$;
        # fastcgi_param PATH_INFO $fastcgi_path_info;

        internal;
    }

    # Deny any other PHP files just in case
    location ~ \.php$ {
        return 404;
    }
}
